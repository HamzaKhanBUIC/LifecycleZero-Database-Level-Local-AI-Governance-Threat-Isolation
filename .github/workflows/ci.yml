name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint --if-present

    - name: Run Build
      run: npm run build
      env:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
        CLERK_SECRET_KEY: sk_test_dummy
        AWS_REGION: us-east-1
        DYNAMODB_TABLE_NAME: LifecycleZero
        # Add other dummy env vars needed for build if required

    # If we had unit/integration tests running purely locally without real DB, they'd go here:
    # - name: Run Integration Tests
    #   run: npm run test:integration
